name: Clean All Files

on:
  workflow_dispatch:  # 手动触发，避免误删
    inputs:
      confirm:
        description: "确认要清空所有文件？输入 'YES' 确认"
        required: true
        default: "NO"

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整历史

      - name: Verify confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "YES" ]; then
            echo "❌ 未输入 YES，取消清空操作"
            exit 1
          fi

      - name: Delete all files except workflows
        run: |
          # 列出当前目录所有文件/文件夹（排除 .github 和 .git）
          ls -A | grep -vE '^\.github$|^\.git$' | xargs -I {} rm -rf {}
          echo "✅ 已清空除 workflows 外的所有文件"

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: clean all files" || echo "⚠️ 没有文件变更需要提交"
          git push origin ${{ github.ref }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
